<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4e8cff" />
      <stop offset="100%" stop-color="#00f5d4" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#0b0c10" />
  <!-- Outer Ring (Glow) -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="none" stroke="url(#neonGlow)" stroke-width="12" filter="url(#glow)" opacity="0.6" />
  <rect x="32" y="32" width="448" height="448" rx="100" fill="none" stroke="url(#neonGlow)" stroke-width="6" />
  
  <!-- Remote Icon Graphics -->
  <g transform="translate(196, 128)" fill="none" stroke="url(#neonGlow)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Antenna/Signal -->
    <path d="M 60 -30 Q 60 -30 60 -30" stroke="#00f5d4" stroke-width="24" />
    <!-- Remote Controller Frame -->
    <rect x="0" y="0" width="120" height="240" rx="30" stroke-width="16" />
    <!-- Buttons representation -->
    <circle cx="60" cy="60" r="16" stroke="#ff4d6d" fill="#ff4d6d" />
    <line x1="35" y1="120" x2="85" y2="120" stroke-width="12" />
    <line x1="35" y1="160" x2="85" y2="160" stroke-width="12" />
  </g>
</svg>
